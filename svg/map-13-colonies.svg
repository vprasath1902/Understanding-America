<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520"><rect width="820" height="520" rx="30" fill="#eaf3fb"/><text x="50" y="58" font-family="Georgia" font-size="34" font-weight="700" fill="#0B3C6D">The Thirteen Colonies</text><text x="50" y="88" font-family="Arial" font-size="16" fill="#555">A simplified teaching map, not a precise geographic map.</text><g transform="translate(500 95)"><path d="M40 10 C100 55 120 130 92 190 C74 230 68 260 88 320 C105 370 72 405 30 405 C-30 405 -70 360 -52 310 C-35 260 -65 225 -46 180 C-20 120 -25 70 40 10z" fill="#fff" stroke="#0B3C6D" stroke-width="4"/><g font-family="Arial" font-size="13" fill="#0B3C6D"><text x="35" y="65">NH</text><text x="45" y="92">MA</text><text x="38" y="118">RI</text><text x="23" y="145">CT</text><text x="15" y="175">NY</text><text x="15" y="205">NJ</text><text x="-2" y="233">PA</text><text x="25" y="258">DE</text><text x="-10" y="286">MD</text><text x="-10" y="315">VA</text><text x="5" y="344">NC</text><text x="20" y="372">SC</text><text x="30" y="398">GA</text></g></g><g font-family="Arial" font-size="16"><rect x="70" y="135" width="300" height="70" rx="18" fill="#0B3C6D"/><text x="90" y="165" fill="white" font-weight="700">New England</text><text x="90" y="190" fill="#dbeafe">NH, MA, RI, CT</text><rect x="70" y="225" width="300" height="85" rx="18" fill="#C9A227"/><text x="90" y="255" fill="white" font-weight="700">Middle Colonies</text><text x="90" y="282" fill="#fff7dc">NY, NJ, PA, DE</text><rect x="70" y="330" width="300" height="100" rx="18" fill="#B22234"/><text x="90" y="360" fill="white" font-weight="700">Southern Colonies</text><text x="90" y="387" fill="#fee2e2">MD, VA, NC, SC, GA</text></g></svg>