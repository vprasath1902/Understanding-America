<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
<title id="title">Checks and Balances</title><desc id="desc">Congress, President, and Courts checking each other.</desc>
<defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#0B3C6D"/><stop offset="1" stop-color="#102a4d"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity=".18"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#C9A227"/></marker></defs>
<rect width="980" height="520" rx="34" fill="url(#bg)"/>
<text x="490" y="58" text-anchor="middle" font-family="Georgia,serif" font-size="34" fill="#fff" font-weight="700">Checks &amp; Balances</text>
<text x="490" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#dbeafe">Each branch has tools to limit the others.</text>
<g filter="url(#shadow)"><rect x="72" y="172" width="240" height="128" rx="22" fill="#fff"/><text x="192" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="800" fill="#0B3C6D">Congress</text><text x="192" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#334155">Makes laws</text><text x="192" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Overrides veto · Confirms judges</text></g>
<g filter="url(#shadow)"><rect x="668" y="172" width="240" height="128" rx="22" fill="#fff"/><text x="788" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="800" fill="#0B3C6D">President</text><text x="788" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#334155">Enforces laws</text><text x="788" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Vetoes bills · Appoints judges</text></g>
<g filter="url(#shadow)"><rect x="370" y="346" width="240" height="128" rx="22" fill="#fff"/><text x="490" y="389" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="800" fill="#0B3C6D">Courts</text><text x="490" y="419" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#334155">Interprets laws</text><text x="490" y="448" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Reviews constitutionality</text></g>
<path d="M315 216 C430 150 550 150 665 216" fill="none" stroke="#C9A227" stroke-width="6" marker-end="url(#arrow)"/>
<path d="M665 256 C560 326 430 326 315 256" fill="none" stroke="#C9A227" stroke-width="6" marker-end="url(#arrow)"/>
<path d="M225 302 C270 390 310 420 366 420" fill="none" stroke="#C9A227" stroke-width="6" marker-end="url(#arrow)"/>
<path d="M616 420 C690 410 740 360 764 304" fill="none" stroke="#C9A227" stroke-width="6" marker-end="url(#arrow)"/>
<circle cx="490" cy="238" r="54" fill="#B22234" opacity=".96"/><text x="490" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#fff" font-weight="800">LIMITED</text><text x="490" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#fff" font-weight="800">POWER</text>
</svg>
