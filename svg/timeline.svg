<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="American history timeline">
<defs><style>.t{font-family:Arial,sans-serif}.h{font-weight:800;fill:#0b3c6d}.s{fill:#667085}.line{stroke:#c9a227;stroke-width:6}.dot{fill:#b22234}</style></defs>
<rect width="900" height="260" fill="#f8f8f6" rx="22"/><text class="t h" x="450" y="42" text-anchor="middle" font-size="28">American Story Timeline</text><line class="line" x1="90" y1="130" x2="810" y2="130"/>
<g class="t" text-anchor="middle"><g transform="translate(90 130)"><circle class="dot" r="12"/><text class="h" y="-28">1607</text><text class="s" y="42">Jamestown</text></g><g transform="translate(230 130)"><circle class="dot" r="12"/><text class="h" y="-28">1776</text><text class="s" y="42">Independence</text></g><g transform="translate(370 130)"><circle class="dot" r="12"/><text class="h" y="-28">1787</text><text class="s" y="42">Constitution</text></g><g transform="translate(510 130)"><circle class="dot" r="12"/><text class="h" y="-28">1865</text><text class="s" y="42">Civil War Ends</text></g><g transform="translate(650 130)"><circle class="dot" r="12"/><text class="h" y="-28">1964</text><text class="s" y="42">Civil Rights</text></g><g transform="translate(810 130)"><circle class="dot" r="12"/><text class="h" y="-28">Today</text><text class="s" y="42">Citizenship</text></g></g></svg>
