<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img" aria-label="How a bill becomes law">
<defs><style>.t{font-family:Arial,sans-serif}.h{font-weight:800;fill:#0b3c6d}.s{fill:#667085}.box{fill:#fff;stroke:#d8dee8;stroke-width:2;rx:16}.arrow{stroke:#b22234;stroke-width:4;marker-end:url(#m)}.num{fill:#0b3c6d}.ntext{fill:#fff;font-weight:800;font-size:15px}</style><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#b22234"/></marker></defs>
<rect width="980" height="300" fill="#f8f8f6" rx="22"/><text class="t h" x="490" y="42" text-anchor="middle" font-size="28">How a Bill Becomes a Law</text>
<g transform="translate(35 88)">
<g><rect class="box" width="120" height="96"/><circle class="num" cx="20" cy="20" r="14"/><text class="t ntext" x="20" y="25" text-anchor="middle">1</text><text class="t h" x="60" y="48" text-anchor="middle" font-size="16">Idea</text><text class="t s" x="60" y="72" text-anchor="middle" font-size="13">Citizen or member</text></g>
<line class="arrow" x1="128" y1="48" x2="165" y2="48"/>
<g transform="translate(175 0)"><rect class="box" width="120" height="96"/><circle class="num" cx="20" cy="20" r="14"/><text class="t ntext" x="20" y="25" text-anchor="middle">2</text><text class="t h" x="60" y="48" text-anchor="middle" font-size="16">Bill</text><text class="t s" x="60" y="72" text-anchor="middle" font-size="13">Introduced</text></g>
<line class="arrow" x1="303" y1="48" x2="340" y2="48"/>
<g transform="translate(350 0)"><rect class="box" width="120" height="96"/><circle class="num" cx="20" cy="20" r="14"/><text class="t ntext" x="20" y="25" text-anchor="middle">3</text><text class="t h" x="60" y="48" text-anchor="middle" font-size="16">Committee</text><text class="t s" x="60" y="72" text-anchor="middle" font-size="13">Review</text></g>
<line class="arrow" x1="478" y1="48" x2="515" y2="48"/>
<g transform="translate(525 0)"><rect class="box" width="120" height="96"/><circle class="num" cx="20" cy="20" r="14"/><text class="t ntext" x="20" y="25" text-anchor="middle">4</text><text class="t h" x="60" y="48" text-anchor="middle" font-size="16">House</text><text class="t s" x="60" y="72" text-anchor="middle" font-size="13">and Senate</text></g>
<line class="arrow" x1="653" y1="48" x2="690" y2="48"/>
<g transform="translate(700 0)"><rect class="box" width="120" height="96"/><circle class="num" cx="20" cy="20" r="14"/><text class="t ntext" x="20" y="25" text-anchor="middle">5</text><text class="t h" x="60" y="48" text-anchor="middle" font-size="16">President</text><text class="t s" x="60" y="72" text-anchor="middle" font-size="13">Signs or vetoes</text></g>
<line class="arrow" x1="828" y1="48" x2="865" y2="48"/>
<g transform="translate(875 0)"><rect class="box" width="70" height="96"/><circle class="num" cx="20" cy="20" r="14"/><text class="t ntext" x="20" y="25" text-anchor="middle">6</text><text class="t h" x="35" y="55" text-anchor="middle" font-size="16">Law</text></g>
</g></svg>
