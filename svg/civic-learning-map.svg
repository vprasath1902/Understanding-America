<g filter="url(#shadow)"><rect x="42" y="410" width="180" height="104" rx="24" fill="#fff"/><text x="132" y="448" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#B22234" font-weight="900">History</text><text x="132" y="474" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">How America began</text></g>
<g filter="url(#shadow)"><rect x="280" y="410" width="180" height="104" rx="24" fill="#fff"/><text x="370" y="448" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#0B3C6D" font-weight="900">Government</text><text x="370" y="474" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">How power works</text></g>
<g filter="url(#shadow)"><rect x="518" y="410" width="180" height="104" rx="24" fill="#fff"/><text x="608" y="448" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" fill="#2E8B57" font-weight="900">Citizenship</text><text x="608" y="474" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Rights & duties</text></g>
