<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 620" role="img" aria-labelledby="title desc">
<title id="title">Understanding America Learning Map</title><desc id="desc">A visual map connecting history, constitution, government, citizenship and reference learning.</desc>
<defs><linearGradient id="navy" x1="0" x2="1"><stop stop-color="#0B3C6D"/><stop offset="1" stop-color="#173b68"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity=".20"/></filter></defs>
<rect width="740" height="620" rx="38" fill="rgba(255,255,255,.10)"/>
<g filter="url(#shadow)"><circle cx="370" cy="118" r="76" fill="#C9A227"/><text x="370" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#fff" font-weight="900">WE THE</text><text x="370" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="#fff" font-weight="900">PEOPLE</text></g>
