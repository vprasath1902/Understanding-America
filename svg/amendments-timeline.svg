<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420"><rect width="1000" height="420" rx="30" fill="#eef4fb"/><text x="50" y="62" font-family="Georgia" font-size="34" font-weight="700" fill="#0B3C6D">The 27 Amendments in Eras</text><g font-family="Arial" font-weight="700"><rect x="70" y="120" width="210" height="190" rx="22" fill="#0B3C6D"/><text x="175" y="165" fill="white" text-anchor="middle" font-size="24">1-10</text><text x="175" y="205" fill="#fff" text-anchor="middle" font-size="18">Bill of Rights</text><text x="175" y="250" fill="#dbeafe" text-anchor="middle" font-size="15">Individual liberties</text><rect x="300" y="120" width="210" height="190" rx="22" fill="#B22234"/><text x="405" y="165" fill="white" text-anchor="middle" font-size="24">13-15</text><text x="405" y="205" fill="#fff" text-anchor="middle" font-size="18">Reconstruction</text><text x="405" y="250" fill="#fee2e2" text-anchor="middle" font-size="15">Slavery, citizenship, vote</text><rect x="530" y="120" width="210" height="190" rx="22" fill="#C9A227"/><text x="635" y="165" fill="white" text-anchor="middle" font-size="24">16-19</text><text x="635" y="205" fill="#fff" text-anchor="middle" font-size="18">Progressive Era</text><text x="635" y="250" fill="#fff7dc" text-anchor="middle" font-size="15">Income tax, senators, women vote</text><rect x="760" y="120" width="170" height="190" rx="22" fill="#2E8B57"/><text x="845" y="165" fill="white" text-anchor="middle" font-size="24">20-27</text><text x="845" y="205" fill="#fff" text-anchor="middle" font-size="18">Modern Era</text><text x="845" y="250" fill="#dcfce7" text-anchor="middle" font-size="15">Terms, succession, voting</text></g></svg>