<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="rm-title rm-desc">
  <title id="rm-title">Reference map — U.S. regions</title>
  <desc id="rm-desc">A stylized map dividing the United States into four regions — West, Midwest, Northeast, and South — each shown as a labeled colored block, with a legend. Demonstrates map fills, borders, labels, and legend styling.</desc>
  <defs><style>
    .t{font-family:Arial,Helvetica,sans-serif}
    .h{font-weight:800;fill:#0b3c6d}
    .s{fill:#667085}
    .region{stroke:#ffffff;stroke-width:3}
    .rlabel{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
  </style></defs>
  <rect width="900" height="520" fill="#f8f8f6" rx="24"/>
  <text class="t h" x="450" y="50" text-anchor="middle" font-size="30">United States Regions</text>

  <!-- stylized region blocks (illustrative, not geographically exact) -->
  <g class="region">
    <rect x="90"  y="110" width="250" height="240" rx="14" fill="#0b3c6d"/>
    <rect x="340" y="110" width="230" height="170" rx="14" fill="#2e8b57"/>
    <rect x="570" y="110" width="240" height="120" rx="14" fill="#6a4c93"/>
    <rect x="340" y="280" width="470" height="170" rx="14" fill="#b22234"/>
  </g>
  <g text-anchor="middle">
    <text class="rlabel" x="215" y="238" font-size="22">West</text>
    <text class="rlabel" x="455" y="200" font-size="22">Midwest</text>
    <text class="rlabel" x="690" y="178" font-size="22">Northeast</text>
    <text class="rlabel" x="575" y="372" font-size="22">South</text>
  </g>

  <!-- legend -->
  <g class="t" font-size="15">
    <rect x="90" y="470" width="18" height="18" rx="4" fill="#0b3c6d"/><text class="s" x="116" y="484">West</text>
    <rect x="200" y="470" width="18" height="18" rx="4" fill="#2e8b57"/><text class="s" x="226" y="484">Midwest</text>
    <rect x="330" y="470" width="18" height="18" rx="4" fill="#6a4c93"/><text class="s" x="356" y="484">Northeast</text>
    <rect x="470" y="470" width="18" height="18" rx="4" fill="#b22234"/><text class="s" x="496" y="484">South</text>
  </g>
</svg>
