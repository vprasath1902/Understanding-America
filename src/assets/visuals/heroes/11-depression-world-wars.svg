    <path d="M-70 -60 q40 20 10 70 q-20 30 30 60" fill="#c9a227" opacity="0.85"/>
    <path d="M40 -80 q34 40 -6 86 q-6 18 36 44" fill="#c9a227" opacity="0.85"/>
