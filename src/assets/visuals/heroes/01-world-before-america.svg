<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h01-title h01-desc">
  <title id="h01-title">Chapter 1 hero — The World Before America</title>
  <desc id="h01-desc">A flat geometric banner: a navy panel with the chapter title and a gold compass star, beside a stylized globe and a sailing ship on stylized waves, evoking the age of exploration.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>

  <!-- navy title panel -->
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="46">The World</text>
  <text class="title" x="80" y="306" font-size="46">Before America</text>
  <text class="sub" x="84" y="356" font-size="22">Chapter 1</text>

  <!-- stylized waves -->
  <g fill="#9cc7f5">
    <rect x="660" y="360" width="540" height="120" fill="#dbeafe"/>
    <path d="M660 380 q45 -24 90 0 t90 0 t90 0 t90 0 t90 0 t90 0 v100 H660 Z" fill="#9cc7f5"/>
  </g>

  <!-- globe -->
  <g transform="translate(900 200)">
    <circle r="120" fill="#2e8b57" stroke="#0b3c6d" stroke-width="4"/>
    <path d="M-120 0 H120 M0 -120 V120" stroke="#0b3c6d" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M-60 -80 q40 30 0 80 q-40 30 0 80" fill="#c9a227" opacity="0.85"/>
    <path d="M40 -70 q30 40 -10 90 q-10 20 30 40" fill="#c9a227" opacity="0.85"/>
  </g>

  <!-- sailing ship -->
  <g transform="translate(760 330)">
    <path d="M-50 0 H50 L36 34 H-36 Z" fill="#0b3c6d"/>
    <rect x="-2" y="-78" width="6" height="78" fill="#0b3c6d"/>
    <path d="M4 -74 L52 -36 L4 -36 Z" fill="#b22234"/>
    <path d="M-4 -64 L-44 -34 L-4 -34 Z" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  </g>
</svg>
