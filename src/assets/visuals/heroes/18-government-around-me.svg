<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h18-title h18-desc">
  <title id="h18-title">Chapter 18 hero — Government Around Me</title>
  <desc id="h18-desc">A flat geometric banner: a navy title panel beside a small town of civic buildings — a school, a city hall, and a library — with a location pin, showing government in the local community.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
    .b{font-family:Arial,Helvetica,sans-serif;fill:#667085}
  </style></defs>
  <rect width="1200" height="480" fill="#dbeafe"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="46">Government</text>
  <text class="title" x="80" y="306" font-size="46">Around Me</text>
  <text class="sub" x="84" y="356" font-size="22">Chapter 18</text>

  <!-- ground -->
  <rect x="660" y="370" width="540" height="110" fill="#2e8b57"/>
  <!-- city hall (center, domed) -->
  <g>
    <rect x="860" y="250" width="150" height="120" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#d8dee8" stroke-width="2"><rect x="878" y="250" width="14" height="120"/><rect x="912" y="250" width="14" height="120"/><rect x="946" y="250" width="14" height="120"/><rect x="980" y="250" width="14" height="120"/></g>
    <polygon points="855,250 1015,250 935,210" fill="#0b3c6d"/>
    <rect x="930" y="180" width="10" height="32" fill="#c9a227"/>
  </g>
  <!-- school (left) -->
  <g>
    <rect x="730" y="290" width="120" height="80" fill="#b22234"/>
    <polygon points="725,290 855,290 790,256" fill="#0b3c6d"/>
    <rect x="778" y="320" width="24" height="50" fill="#ffffff"/>
  </g>
  <!-- library (right) -->
  <g>
    <rect x="1020" y="300" width="110" height="70" fill="#c9a227"/>
    <rect x="1020" y="288" width="110" height="14" fill="#0b3c6d"/>
    <rect x="1066" y="330" width="22" height="40" fill="#ffffff"/>
  </g>
  <!-- location pin -->
  <g transform="translate(935 130)">
    <path d="M0 60 C-34 18 -28 -28 0 -28 C28 -28 34 18 0 60 Z" fill="#b22234" stroke="#0b3c6d" stroke-width="3"/>
    <circle cx="0" cy="-2" r="12" fill="#ffffff"/>
  </g>
</svg>
