<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h21-title h21-desc">
  <title id="h21-title">Chapter 21 hero — Becoming an American Citizen</title>
  <desc id="h21-desc">A flat geometric banner: a navy title panel beside a naturalization certificate with a gold seal and ribbon and a small American flag, representing becoming a citizen.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="44">Becoming an</text>
  <text class="title" x="80" y="306" font-size="44">American Citizen</text>
  <text class="sub" x="84" y="356" font-size="22">Chapter 21</text>

  <!-- certificate -->
  <rect x="760" y="120" width="320" height="220" rx="10" fill="#ffffff" stroke="#c9a227" stroke-width="4"/>
  <rect x="780" y="140" width="280" height="180" rx="6" fill="none" stroke="#d8dee8" stroke-width="2"/>
  <g stroke="#667085" stroke-width="4" opacity="0.6"><line x1="804" y1="176" x2="1036" y2="176"/><line x1="804" y1="204" x2="1036" y2="204"/><line x1="804" y1="232" x2="980" y2="232"/></g>
  <!-- seal + ribbon -->
  <circle cx="850" cy="290" r="30" fill="#c9a227" stroke="#0b3c6d" stroke-width="3"/>
  <polygon points="838,312 838,348 850,336 862,348 862,312" fill="#b22234"/>
  <!-- small flag -->
  <g transform="translate(1000 250)">
    <rect x="-2" y="-10" width="6" height="90" fill="#667085"/>
    <rect x="4" y="-10" width="56" height="38" fill="#ffffff" stroke="#0b3c6d" stroke-width="1.5"/>
    <g fill="#b22234"><rect x="4" y="-10" width="56" height="6"/><rect x="4" y="2" width="56" height="6"/><rect x="4" y="14" width="56" height="6"/></g>
    <rect x="4" y="-10" width="24" height="20" fill="#0b3c6d"/>
  </g>
</svg>
