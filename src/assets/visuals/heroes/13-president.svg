<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h13-title h13-desc">
  <title id="h13-title">Chapter 13 hero — The President of the United States</title>
  <desc id="h13-desc">A flat geometric banner: a navy title panel beside a stylized White House with columns, a pediment, and a flag.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
  </style></defs>
  <rect width="1200" height="480" fill="#dbeafe"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="40">The President of</text>
  <text class="title" x="80" y="300" font-size="40">the United States</text>
  <text class="sub" x="84" y="350" font-size="22">Chapter 13</text>

  <!-- White House -->
  <g transform="translate(930 290)">
    <rect x="-200" y="120" width="400" height="40" rx="4" fill="#0b3c6d"/>
    <rect x="-180" y="20" width="360" height="100" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <g fill="#ffffff" stroke="#d8dee8" stroke-width="2">
      <rect x="-150" y="20" width="18" height="100"/><rect x="-108" y="20" width="18" height="100"/>
      <rect x="-66" y="20" width="18" height="100"/><rect x="-24" y="20" width="18" height="100"/>
      <rect x="18" y="20" width="18" height="100"/><rect x="60" y="20" width="18" height="100"/>
      <rect x="102" y="20" width="18" height="100"/><rect x="144" y="20" width="18" height="100"/>
    </g>
    <rect x="-200" y="0" width="400" height="22" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <polygon points="-70,-40 70,-40 90,0 -90,0" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <rect x="-3" y="-78" width="6" height="38" fill="#667085"/>
    <rect x="3" y="-76" width="34" height="20" fill="#b22234"/>
    <rect x="-26" y="70" width="24" height="50" fill="#0b3c6d"/>
  </g>
</svg>
