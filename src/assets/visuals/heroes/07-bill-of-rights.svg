<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h07-title h07-desc">
  <title id="h07-title">Chapter 7 hero — The Bill of Rights</title>
  <desc id="h07-desc">A flat geometric banner: a navy title panel beside a parchment showing the number ten, next to a balanced scale of justice, representing the first ten amendments protecting individual rights.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
    .big{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#c9a227}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="46">The Bill</text>
  <text class="title" x="80" y="306" font-size="46">of Rights</text>
  <text class="sub" x="84" y="356" font-size="22">Chapter 7</text>

  <!-- parchment with "10" -->
  <rect x="740" y="140" width="190" height="210" rx="10" fill="#f4ecd8" stroke="#c9a227" stroke-width="3"/>
  <text class="big" x="835" y="270" text-anchor="middle" font-size="120">10</text>

  <!-- scales of justice -->
  <g stroke="#0b3c6d" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="1060" y1="120" x2="1060" y2="360"/>
    <line x1="980" y1="160" x2="1140" y2="160"/>
    <line x1="980" y1="160" x2="955" y2="230"/>
    <line x1="980" y1="160" x2="1005" y2="230"/>
    <line x1="1140" y1="160" x2="1115" y2="230"/>
    <line x1="1140" y1="160" x2="1165" y2="230"/>
    <rect x="1020" y="360" width="80" height="14" rx="6" fill="#0b3c6d" stroke="none"/>
  </g>
  <path d="M955 230 a35 18 0 0 0 50 0 Z" fill="#c9a227" stroke="#0b3c6d" stroke-width="3"/>
  <path d="M1115 230 a35 18 0 0 0 50 0 Z" fill="#c9a227" stroke="#0b3c6d" stroke-width="3"/>
  <circle cx="1060" cy="120" r="9" fill="#c9a227" stroke="#0b3c6d" stroke-width="3"/>
</svg>
