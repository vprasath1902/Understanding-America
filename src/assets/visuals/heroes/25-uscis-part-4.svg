<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h25-title h25-desc">
  <title id="h25-title">Chapter 25 hero — USCIS Civics: Modern America and Symbols</title>
  <desc id="h25-desc">A flat geometric banner: a navy title panel beside an American flag and a torch flame, representing modern America and its national symbols.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
    .series{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#c9a227}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="series" x="80" y="212" font-size="22">USCIS Civics Test</text>
  <text class="title" x="80" y="262" font-size="42">Modern America</text>
  <text class="title" x="80" y="312" font-size="42">&amp; Symbols</text>
  <text class="sub" x="84" y="360" font-size="22">Chapter 25</text>

  <!-- flag -->
  <g>
    <rect x="772" y="120" width="10" height="300" rx="4" fill="#667085"/>
    <rect x="782" y="130" width="230" height="150" fill="#ffffff" stroke="#0b3c6d" stroke-width="2"/>
    <g fill="#b22234"><rect x="782" y="130" width="230" height="22"/><rect x="782" y="174" width="230" height="22"/><rect x="782" y="218" width="230" height="22"/><rect x="782" y="262" width="230" height="18"/></g>
    <rect x="782" y="130" width="100" height="88" fill="#0b3c6d"/>
    <polygon fill="#ffffff" points="832,150 838,168 856,168 841,179 847,197 832,186 817,197 823,179 808,168 826,168"/>
  </g>
  <!-- torch -->
  <g transform="translate(1080 270)">
    <rect x="-14" y="20" width="28" height="120" rx="6" fill="#2e8b57"/>
    <rect x="-30" y="6" width="60" height="20" rx="6" fill="#c9a227"/>
    <path d="M0 -70 C26 -36 22 -2 0 6 C-22 -2 -26 -36 0 -70 Z" fill="#c9a227" stroke="#b22234" stroke-width="3"/>
  </g>
</svg>
