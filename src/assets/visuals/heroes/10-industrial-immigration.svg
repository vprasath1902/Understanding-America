<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h10i-title h10i-desc">
  <title id="h10i-title">Chapter 10 hero — Industrial America and a Nation of Immigrants</title>
  <desc id="h10i-desc">A flat geometric banner: a navy title panel beside factory buildings with smokestacks and a torch, representing industry and the immigrants welcomed by the Statue of Liberty.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="38">Industrial America</text>
  <text class="title" x="80" y="300" font-size="38">&amp; Immigrants</text>
  <text class="sub" x="84" y="350" font-size="22">Chapter 10</text>

  <!-- factory -->
  <g>
    <rect x="720" y="250" width="220" height="130" fill="#0b3c6d"/>
    <rect x="760" y="200" width="34" height="50" fill="#667085"/>
    <rect x="820" y="180" width="34" height="70" fill="#667085"/>
    <circle cx="777" cy="186" r="16" fill="#dbeafe"/><circle cx="800" cy="172" r="12" fill="#dbeafe"/>
    <circle cx="837" cy="160" r="18" fill="#dbeafe"/><circle cx="862" cy="148" r="12" fill="#dbeafe"/>
    <g fill="#c9a227"><rect x="740" y="290" width="26" height="26"/><rect x="786" y="290" width="26" height="26"/><rect x="832" y="290" width="26" height="26"/><rect x="878" y="290" width="26" height="26"/></g>
  </g>
  <!-- torch (Liberty) -->
  <g transform="translate(1070 280)">
    <rect x="-16" y="20" width="32" height="120" rx="6" fill="#2e8b57"/>
    <rect x="-34" y="6" width="68" height="20" rx="6" fill="#c9a227"/>
    <path d="M0 -74 C28 -38 24 -2 0 6 C-24 -2 -28 -38 0 -74 Z" fill="#c9a227" stroke="#b22234" stroke-width="3"/>
  </g>
</svg>
