<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h05-title h05-desc">
  <title id="h05-title">Chapter 5 hero — America's First Government</title>
  <desc id="h05-desc">A flat geometric banner: a navy title panel beside a rolled parchment ringed by thirteen gold stars, representing the thirteen states loosely united under the Articles of Confederation.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="44">America’s First</text>
  <text class="title" x="80" y="306" font-size="44">Government</text>
  <text class="sub" x="84" y="356" font-size="22">Chapter 5</text>

  <!-- ring of 13 stars -->
  <g fill="#c9a227">
    <circle cx="930" cy="100" r="7"/><circle cx="998" cy="112" r="7"/><circle cx="1050" cy="158" r="7"/>
    <circle cx="1078" cy="220" r="7"/><circle cx="1074" cy="288" r="7"/><circle cx="1040" cy="344" r="7"/>
    <circle cx="984" cy="380" r="7"/><circle cx="916" cy="388" r="7"/><circle cx="852" cy="368" r="7"/>
    <circle cx="806" cy="320" r="7"/><circle cx="784" cy="256" r="7"/><circle cx="790" cy="188" r="7"/>
    <circle cx="824" cy="132" r="7"/>
  </g>
  <!-- parchment scroll -->
  <g transform="translate(930 240)">
    <rect x="-90" y="-90" width="180" height="180" rx="10" fill="#f4ecd8" stroke="#c9a227" stroke-width="3"/>
    <rect x="-110" y="-100" width="220" height="22" rx="11" fill="#c9a227"/>
    <rect x="-110" y="78" width="220" height="22" rx="11" fill="#c9a227"/>
    <g stroke="#667085" stroke-width="3" opacity="0.6">
      <line x1="-60" y1="-50" x2="60" y2="-50"/><line x1="-60" y1="-16" x2="60" y2="-16"/>
      <line x1="-60" y1="18" x2="60" y2="18"/><line x1="-60" y1="52" x2="30" y2="52"/>
    </g>
  </g>
</svg>
