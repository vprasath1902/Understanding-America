<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="h14-title h14-desc">
  <title id="h14-title">Chapter 14 hero — The Executive Branch</title>
  <desc id="h14-desc">A flat geometric banner: a navy title panel beside two interlocking gears, representing the executive branch's departments and agencies that carry out the laws.</desc>
  <defs><style>
    .title{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#ffffff}
    .sub{font-family:Arial,Helvetica,sans-serif;fill:#dbeafe}
  </style></defs>
  <rect width="1200" height="480" fill="#f8f8f6"/>
  <rect x="0" y="0" width="660" height="480" fill="#0b3c6d"/>
  <polygon fill="#c9a227" points="80,84 95,124 138,124 103,150 117,192 80,166 43,192 57,150 22,124 65,124"/>
  <text class="title" x="80" y="250" font-size="46">The Executive</text>
  <text class="title" x="80" y="306" font-size="46">Branch</text>
  <text class="sub" x="84" y="356" font-size="22">Chapter 14</text>

  <!-- big gear -->
  <g transform="translate(910 230)" fill="#0b3c6d">
    <g>
      <rect x="-12" y="-96" width="24" height="28"/><rect x="-12" y="68" width="24" height="28"/>
      <rect x="-96" y="-12" width="28" height="24"/><rect x="68" y="-12" width="28" height="24"/>
      <rect x="-74" y="-74" width="24" height="24" transform="rotate(45)"/>
      <rect x="50" y="50" width="24" height="24" transform="rotate(45)"/>
      <rect x="-74" y="50" width="24" height="24" transform="rotate(-45)"/>
      <rect x="50" y="-74" width="24" height="24" transform="rotate(-45)"/>
    </g>
    <circle r="74"/><circle r="30" fill="#f8f8f6"/>
  </g>
  <!-- small gear -->
  <g transform="translate(1040 330)" fill="#c9a227">
    <g>
      <rect x="-9" y="-64" width="18" height="20"/><rect x="-9" y="44" width="18" height="20"/>
      <rect x="-64" y="-9" width="20" height="18"/><rect x="44" y="-9" width="20" height="18"/>
      <rect x="-50" y="-50" width="18" height="18" transform="rotate(45)"/>
      <rect x="32" y="32" width="18" height="18" transform="rotate(45)"/>
      <rect x="-50" y="32" width="18" height="18" transform="rotate(-45)"/>
      <rect x="32" y="-50" width="18" height="18" transform="rotate(-45)"/>
    </g>
    <circle r="50"/><circle r="20" fill="#f8f8f6"/>
  </g>
</svg>
